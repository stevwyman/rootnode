{% load django_bootstrap5 static %}
<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>{% block title %}GEDCOM‑Stammbaum{% endblock %}</title>

    <!-- Bootstrap‑CSS über das django_bootstrap5‑Tag -->
    {% bootstrap_css %}

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">Stammbaum</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Navigation umschalten">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'genview:individual-list' %}">Personen</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'genview:family-list' %}">Familien</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

{% bootstrap_javascript %}
</body>
</html>
